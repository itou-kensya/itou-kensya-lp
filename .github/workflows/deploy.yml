name: Deploy LP to Lolipop

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://itou-kensya.com/lp/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync files to Lolipop
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /lp/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/desktop.ini
            **/Thumbs.db
            **/.DS_Store
            **/README.md
            **/LICENSE
